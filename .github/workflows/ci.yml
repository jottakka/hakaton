name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - run: pip install pre-commit
      - run: pre-commit run --all-files

  aioa:
    name: aioa – lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aioa
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Sync dev dependencies
        run: uv sync --group dev
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .
      - name: pytest
        run: uv run pytest --cov=src --cov-report=term-missing -q

  geo_audit_arcade:
    name: geo_audit_arcade – lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/geo_audit_arcade
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Sync dev dependencies
        run: uv sync --extra dev
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .
      - name: pytest
        run: uv run pytest --cov=src --cov-report=term-missing -q

  benchmark_control_arcade:
    name: benchmark_control_arcade – lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/benchmark_control_arcade
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Sync dev dependencies
        run: uv sync --group dev --extra runners
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .
      - name: pytest
        run: uv run pytest --cov=src --cov-report=term-missing -q
